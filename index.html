<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f8b8c4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="BabyMeal">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/style.css">
  <title>BabyMeal</title>
</head>
<body>
  <div id="loading" class="loading hidden">서버와 동기화 중…</div>

  <div id="authView">
    <div class="auth-card">
      <div class="logo">🥣 BabyMeal</div>
      <div class="subtitle">PC와 아이폰에서 같은 식단과 재고를 사용해요.</div>
      <label for="authEmail">이메일</label>
      <input id="authEmail" type="email" autocomplete="email" placeholder="example@email.com">
      <label for="authPassword">비밀번호</label>
      <input id="authPassword" type="password" autocomplete="current-password" minlength="6" placeholder="6자 이상">
      <button class="btn primary full" type="button" id="loginButton">로그인</button>
      <div id="authMsg" class="msg"></div>
    </div>
  </div>

  <div id="appView" class="hidden">
    <header>
      <div class="top">
        <div>
          <div class="brand">🥣 BabyMeal</div>
          <div class="meta"><span class="status-dot"></span>Supabase 동기화</div>
        </div>
        <div class="account-box">
          <div id="accountEmail" class="account"></div>
          <button class="btn ghost" type="button" id="logoutButton">로그아웃</button>
        </div>
      </div>
      <nav>
        <button class="active" data-tab="home">🏠 홈</button>
        <button data-tab="ingredients">🧊 재고</button>
        <button data-tab="menus">🍽️ 메뉴</button>
        <button data-tab="plan">📅 주간 식단</button>
        <button data-tab="shopping">🛒 장보기</button>
        <button data-tab="settings">⚙️ 설정</button>
      </nav>
    </header>

    <main>
      <section id="home" class="active">
        <div class="grid">
          <div class="metric pink">재고<strong id="mIngredients">0</strong><small>개 항목</small></div>
          <div class="metric mint">메뉴<strong id="mMenus">0</strong><small>개 저장</small></div>
          <div class="metric lavender">오늘 식단<strong id="mToday">0</strong><small>끼</small></div>
          <div class="metric yellow">장보기<strong id="mShopping">0</strong><small>개 남음</small></div>
        </div>
        <div class="card"><h3>오늘 식단</h3><div id="todayMeals"></div></div>
        <div class="notice">한 기기에서 수정하면 서버에 저장되고 다른 기기에서도 같은 계정으로 확인할 수 있어요.</div>
      </section>

      <section id="ingredients">
        <div class="card">
          <h3 id="ingredientFormTitle">식재료 추가</h3>
          <input id="ingredientEditId" type="hidden">
          <input id="ingName" placeholder="식재료명">
          <div class="row">
            <select id="ingCategory">
              <option>채소/과일</option><option>육류</option><option>수산/해산/건어물</option>
              <option>곡/두부/쌀/견과</option><option>정육/계란/유제품</option><option>면</option>
              <option>장/조미료</option><option>간편식/조리식품</option><option>반찬/김치</option><option>기타</option>
            </select>
            <select id="ingPlace"><option>냉장</option><option>냉동</option><option>상온</option></select>
          </div>
          <div class="row3">
            <input id="ingQty" type="number" min="0" max="99999" step="0.1" value="1" placeholder="총 수량">
            <select id="ingUnit"><option>개</option><option>g</option><option>ml</option><option>팩</option><option>봉</option><option>병</option></select>
            <input id="ingExpiry" type="date" aria-label="유통기한">
          </div>
          <div class="subsection-title">소분 정보 <span class="meta">(선택)</span></div>
          <div class="row3">
            <input id="ingPortionAmount" type="number" min="0" step="0.1" placeholder="1개당 용량 예: 50">
            <select id="ingPortionUnit"><option>g</option><option>ml</option><option>개</option><option>팩</option><option>봉</option></select>
            <input id="ingPortionCount" type="number" min="0" step="1" placeholder="소분 개수 예: 3">
          </div>
          <div class="toolbar">
            <button class="btn primary" type="button" id="ingredientSaveButton">추가</button>
            <button class="btn ghost hidden" type="button" id="ingredientCancelButton">수정 취소</button>
          </div>
        </div>
        <div class="toolbar filter-toolbar">
          <button class="btn ghost" data-filter="전체">전체</button>
          <button class="btn ghost" data-filter="냉장">냉장</button>
          <button class="btn ghost" data-filter="냉동">냉동</button>
          <button class="btn ghost" data-filter="상온">상온</button>
          <button class="btn ghost" data-filter="소진">소진</button>
        </div>
        <div id="ingredientList"></div>
      </section>

      <section id="menus">
        <div class="card">
          <h3 id="menuFormTitle">메뉴 저장</h3>
          <input id="menuEditId" type="hidden">
          <input id="menuName" placeholder="메뉴명">
          <input id="menuIngredients" placeholder="재료 메모">
          <div class="row3">
            <input id="menuExpiry" type="date" aria-label="유통기한">
            <input id="menuTotalQty" type="number" min="0" step="0.1" placeholder="완제품 총량">
            <select id="menuTotalUnit"><option>g</option><option>ml</option><option>개</option><option>팩</option><option>회분</option></select>
          </div>
          <select id="menuReaction"><option>반응 미기록</option><option>잘 먹음</option><option>보통</option><option>거부</option></select>
          <textarea id="menuMemo" placeholder="조리법 또는 메모"></textarea>
          <div class="toolbar">
            <button class="btn primary" type="button" id="menuSaveButton">저장</button>
            <button class="btn ghost hidden" type="button" id="menuCancelButton">수정 취소</button>
          </div>
        </div>
        <div id="menuList"></div>
      </section>

      <section id="plan">
        <div class="card">
          <h3>식단 추가</h3>
          <div class="row3">
            <input id="planDate" type="date">
            <select id="planSlot"><option>아침</option><option>점심</option><option>간식</option><option>저녁</option></select>
            <select id="planMenu"></select>
          </div>
          <div class="row">
            <input id="planCustom" placeholder="또는 직접 메뉴 입력">
            <button class="btn primary" type="button" id="planAddButton">추가</button>
          </div>
        </div>
        <div class="weekly-wrap card">
          <div class="weekly-head">
            <button class="btn ghost" type="button" id="prevWeekButton">← 이전 주</button>
            <h3 id="weekTitle">주간 식단</h3>
            <button class="btn ghost" type="button" id="nextWeekButton">다음 주 →</button>
          </div>
          <div class="weekly-scroll"><div id="weeklyTable"></div></div>
        </div>
      </section>

      <section id="shopping">
        <div class="card">
          <h3>장보기 추가</h3>
          <div class="row"><input id="shopName" placeholder="구매할 식재료"><button class="btn primary" type="button" id="shoppingAddButton">추가</button></div>
        </div>
        <div class="card"><h3>구매 전</h3><div id="shoppingPendingList"></div></div>
        <div class="card completed-card"><h3>구매 완료</h3><div id="shoppingCompletedList"></div></div>
      </section>

      <section id="settings">
        <div class="card">
          <h3>새로고침</h3>
          <button class="btn ghost" type="button" id="reloadButton">서버 데이터 다시 불러오기</button>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app.js"></script>
</body>
</html>
