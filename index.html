<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f8b8c4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="BabyMeal">
<link rel="manifest" href="manifest.webmanifest">
<title>BabyMeal</title>
<style>
:root{--bg:#fffaf8;--card:#fff;--ink:#332f30;--muted:#82797b;--line:#eee3e4;--pink:#f8b8c4;--pink2:#fde4e8;--mint:#dff2e6;--blue:#dcecf7;--lav:#ebe3f7;--peach:#fae2d5;--yellow:#fff0bd;--danger:#a83d3d;--shadow:0 8px 28px rgba(90,50,58,.07)}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.hidden{display:none!important}
#authView{min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(155deg,#fff8f6,#fde8ed)}
.auth-card{width:min(430px,100%);background:#fff;border:1px solid var(--line);border-radius:28px;padding:26px;box-shadow:var(--shadow)}
.logo{font-size:30px;font-weight:900;margin-bottom:6px}
.subtitle{color:var(--muted);font-size:14px;margin-bottom:22px}
input,select,textarea{width:100%;padding:12px 13px;border:1px solid #ddd2d3;border-radius:13px;background:#fff;margin:6px 0 10px}
textarea{min-height:84px;resize:vertical}
.btn{border:0;border-radius:13px;padding:11px 14px;font-weight:800}
.primary{background:#332f30;color:#fff}
.soft{background:var(--pink2);color:#5c3c42}
.ghost{background:#f4f0ef;color:#4b4546}
.danger{background:#ffe1df;color:var(--danger)}
.full{width:100%}
.auth-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.msg{min-height:22px;margin-top:10px;color:var(--muted);font-size:13px}
header{position:sticky;top:0;z-index:20;background:rgba(255,250,248,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.top{max-width:1050px;margin:auto;padding:14px 15px 9px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{font-size:23px;font-weight:900}
.account{font-size:12px;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
nav{max-width:1050px;margin:auto;display:flex;gap:7px;overflow:auto;padding:6px 12px 11px}
nav button{border:0;background:#f2eeed;padding:9px 14px;border-radius:999px;font-weight:800;white-space:nowrap}
nav button.active{background:#332f30;color:white}
main{max-width:1050px;margin:auto;padding:14px 14px 100px}
section{display:none} section.active{display:block}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.metric{border-radius:20px;padding:15px;min-height:105px}
.metric strong{display:block;font-size:28px;margin-top:9px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:15px;margin:11px 0;box-shadow:var(--shadow)}
h2,h3{margin:0 0 12px}
.row{display:grid;grid-template-columns:2fr 1fr;gap:8px}
.row3{display:grid;grid-template-columns:1.2fr .8fr 1fr;gap:8px}
.toolbar{display:flex;flex-wrap:wrap;gap:7px}
.item{display:flex;align-items:center;justify-content:space-between;gap:12px}
.item-title{font-weight:900}
.meta{font-size:13px;color:var(--muted);margin-top:4px}
.tag{display:inline-block;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:800;margin-right:4px}
.tag-room{background:var(--peach)}.tag-cold{background:var(--blue)}.tag-freeze{background:var(--lav)}.tag-cat{background:var(--mint)}
.depleted{opacity:.5;text-decoration:line-through}
.empty{text-align:center;padding:22px;color:var(--muted)}
.notice{padding:12px 14px;background:var(--yellow);border-radius:15px;font-size:13px}
.day{background:#fff;border:1px solid var(--line);border-radius:17px;padding:12px;margin:9px 0}
.day h4{margin:0 0 8px}
.meal{display:grid;grid-template-columns:56px 1fr auto;gap:8px;align-items:center;border-top:1px dashed #eadfe0;padding:9px 0}
.meal:first-of-type{border-top:0}
.slot{font-size:12px;font-weight:900;color:#7f7275}
.loading{position:fixed;inset:0;z-index:99;background:rgba(255,250,248,.72);display:grid;place-items:center;font-weight:900}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;background:#77bd86;margin-right:5px}
@media(max-width:700px){
 .grid{grid-template-columns:1fr 1fr}
 .row,.row3{grid-template-columns:1fr}
 .account{display:none}
 .item{align-items:flex-start}
}
</style>
</head>
<body>
<div id="loading" class="loading hidden">서버와 동기화 중…</div>

<div id="authView">
 <div class="auth-card">
  <div class="logo">🥣 BabyMeal</div>
  <div class="subtitle">PC와 아이폰에서 같은 식단과 재고를 사용해요.</div>
  <label>이메일</label>
  <input id="authEmail" type="email" autocomplete="email" placeholder="example@email.com">
  <label>비밀번호</label>
  <input id="authPassword" type="password" autocomplete="current-password" minlength="6" placeholder="6자 이상">
  <div class="auth-actions">
   <button class="btn primary" onclick="signIn()">로그인</button>
   <button class="btn soft" onclick="signUp()">첫 가입</button>
  </div>
  <div id="authMsg" class="msg"></div>
 </div>
</div>

<div id="appView" class="hidden">
<header>
 <div class="top">
  <div>
   <div class="brand">🥣 BabyMeal</div>
   <div class="meta"><span class="status-dot"></span>Supabase 동기화</div>
  </div>
  <div style="text-align:right">
   <div id="accountEmail" class="account"></div>
   <button class="btn ghost" onclick="signOut()">로그아웃</button>
  </div>
 </div>
 <nav>
  <button class="active" data-tab="home">홈</button>
  <button data-tab="ingredients">재고</button>
  <button data-tab="menus">메뉴</button>
  <button data-tab="plan">주간 식단</button>
  <button data-tab="shopping">장보기</button>
  <button data-tab="settings">설정</button>
 </nav>
</header>
<main>
<section id="home" class="active">
 <div class="grid">
  <div class="metric" style="background:var(--pink2)">재고<strong id="mIngredients">0</strong><small>개 항목</small></div>
  <div class="metric" style="background:var(--mint)">메뉴<strong id="mMenus">0</strong><small>개 저장</small></div>
  <div class="metric" style="background:var(--lav)">오늘 식단<strong id="mToday">0</strong><small>끼</small></div>
  <div class="metric" style="background:var(--yellow)">장보기<strong id="mShopping">0</strong><small>개 남음</small></div>
 </div>
 <div class="card"><h3>오늘 식단</h3><div id="todayMeals"></div></div>
 <div class="notice">한 기기에서 수정하면 서버에 저장되고 다른 기기에서도 같은 계정으로 확인할 수 있어.</div>
</section>

<section id="ingredients">
 <div class="card">
  <h3>식재료 추가</h3>
  <input id="ingName" placeholder="식재료명">
  <div class="row">
   <select id="ingCategory"><option>채소/과일</option><option>육류</option><option>수산/해산/건어물</option><option>곡/두부/쌀/견과</option><option>정육/계란/유제품</option><option>면</option><option>장/조미료</option><option>간편식/조리식품</option><option>반찬/김치</option><option>기타</option></select>
   <select id="ingPlace"><option>냉장</option><option>냉동</option><option>상온</option></select>
  </div>
  <div class="row3">
   <input id="ingQty" type="number" min="0" max="99999" step="0.1" value="1">
   <select id="ingUnit"><option>개</option><option>g</option><option>ml</option><option>팩</option><option>봉</option><option>병</option></select>
   <input id="ingExpiry" type="date">
  </div>
  <button class="btn primary" onclick="addIngredient()">추가</button>
 </div>
 <div class="toolbar">
  <button class="btn ghost" onclick="setFilter('전체')">전체</button>
  <button class="btn ghost" onclick="setFilter('냉장')">냉장</button>
  <button class="btn ghost" onclick="setFilter('냉동')">냉동</button>
  <button class="btn ghost" onclick="setFilter('상온')">상온</button>
  <button class="btn ghost" onclick="setFilter('소진')">소진</button>
 </div>
 <div id="ingredientList"></div>
</section>

<section id="menus">
 <div class="card">
  <h3>메뉴 저장</h3>
  <input id="menuName" placeholder="메뉴명">
  <input id="menuIngredients" placeholder="재료 메모">
  <select id="menuReaction"><option>반응 미기록</option><option>잘 먹음</option><option>보통</option><option>거부</option></select>
  <textarea id="menuMemo" placeholder="조리법 또는 메모"></textarea>
  <button class="btn primary" onclick="addMenu()">저장</button>
 </div>
 <div id="menuList"></div>
</section>

<section id="plan">
 <div class="card">
  <h3>식단 추가</h3>
  <input id="planDate" type="date">
  <select id="planSlot"><option>아침</option><option>점심</option><option>간식</option><option>저녁</option></select>
  <select id="planMenu"></select>
  <input id="planCustom" placeholder="또는 직접 메뉴 입력">
  <button class="btn primary" onclick="addPlan()">추가</button>
 </div>
 <div id="planList"></div>
</section>

<section id="shopping">
 <div class="card">
  <h3>장보기 추가</h3>
  <div class="row"><input id="shopName" placeholder="구매할 식재료"><button class="btn primary" onclick="addShopping()">추가</button></div>
 </div>
 <div id="shoppingList"></div>
</section>

<section id="settings">
 <div class="card">
  <h3>로컬 데이터 가져오기</h3>
  <p class="meta">이전 v0.2를 같은 브라우저에서 사용했다면 기존 로컬 데이터를 서버로 한 번 복사할 수 있어.</p>
  <button class="btn soft" onclick="migrateLegacy()">이전 데이터 서버로 복사</button>
 </div>
 <div class="card">
  <h3>새로고침</h3>
  <button class="btn ghost" onclick="loadAll()">서버 데이터 다시 불러오기</button>
 </div>
</section>
</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://vspqkebqikxakauvfxiy.supabase.co";
const SUPABASE_KEY = "sb_publishable_wUg7_jDdKtyXxx78kiN3Lg_NrTAwh_4";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let user = null;
let state = {ingredients:[],menus:[],plans:[],shopping:[]};
let ingredientFilter = "전체";
let realtimeChannel = null;

const $ = id => document.getElementById(id);
function esc(s=""){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function setLoading(v){$("loading").classList.toggle("hidden",!v)}
function message(t,isError=false){$("authMsg").textContent=t;$("authMsg").style.color=isError?"#a83d3d":"#82797b"}
function dateToday(){return new Date().toLocaleDateString("sv-SE")}
function daysLeft(date){
 if(!date)return null;
 const today=new Date(dateToday()+"T00:00:00");
 const d=new Date(date+"T00:00:00");
 return Math.round((d-today)/86400000);
}
function dLabel(date){
 const d=daysLeft(date); if(d===null)return "";
 if(d===0)return " · 오늘까지";
 return d>0?` · D-${d}`:` · ${Math.abs(d)}일 지남`;
}
function fail(error){
 console.error(error);
 alert(error?.message || "처리 중 오류가 발생했어.");
}

async function signup() {
  const email = $("authEmail").value.trim().toLowerCase();
  const password = $("authPassword").value;

  if (!email || password.length < 6) {
    return message("이메일과 6자 이상 비밀번호를 입력해 주세요.", true);
  }

  setLoading(true);

  try {
    const { data, error } = await sb.auth.signUp({
      email,
      password,
      options: {
        emailRedirectTo: `${window.location.origin}/`
      }
    });

    if (error) {
      const errorText = error.message || "";

      if (
        error.status === 429 ||
        /rate limit|too many requests/i.test(errorText)
      ) {
        return message(
          "가입 요청이 너무 많습니다. 잠시 기다린 후 한 번만 다시 시도해 주세요.",
          true
        );
      }

      if (/invalid.*email|email.*invalid/i.test(errorText)) {
        return message("이메일 주소가 올바른지 다시 확인해 주세요.", true);
      }

      return message(`가입 실패: ${errorText}`, true);
    }

    if (
      data.user &&
      Array.isArray(data.user.identities) &&
      data.user.identities.length === 0
    ) {
      return message(
        "이미 가입된 이메일일 수 있습니다. 로그인해 보세요.",
        true
      );
    }

    if (data.session) {
      message("가입과 로그인이 완료되었습니다.");
    } else {
      message(
        "가입 요청이 완료되었습니다. 이메일 인증 후 로그인해 주세요."
      );
    }
  } catch (error) {
    console.error(error);
    message("가입 처리 중 오류가 발생했습니다.", true);
  } finally {
    setLoading(false);
  }
async function signin(){
 const email=$("authEmail").value.trim(), password=$("authPassword").value;
 if(!email||!password)return message("이메일과 비밀번호를 입력해줘.",true);
 const {error}=await sb.auth.signInWithPassword({email,password});
 if(error)return message("로그인 실패: "+error.message,true);
}
async function signOut(){await sb.auth.signOut()}

sb.auth.onAuthStateChange(async(event,session)=>{
 user=session?.user||null;
 if(user){
  $("authView").classList.add("hidden");
  $("appView").classList.remove("hidden");
  $("accountEmail").textContent=user.email||"";
  await loadAll();
  subscribeRealtime();
 }else{
  if(realtimeChannel){await sb.removeChannel(realtimeChannel);realtimeChannel=null}
  $("appView").classList.add("hidden");
  $("authView").classList.remove("hidden");
  state={ingredients:[],menus:[],plans:[],shopping:[]};
 }
});
(async()=>{
 const {data}=await sb.auth.getSession();
 if(!data.session) setLoading(false);
})();

document.querySelectorAll("nav button").forEach(btn=>btn.onclick=()=>{
 document.querySelectorAll("nav button").forEach(x=>x.classList.remove("active"));
 document.querySelectorAll("main section").forEach(x=>x.classList.remove("active"));
 btn.classList.add("active"); $(btn.dataset.tab).classList.add("active");
});

async function loadAll(){
 if(!user)return;
 setLoading(true);
 const [a,b,c,d]=await Promise.all([
  sb.from("ingredients").select("*").order("depleted").order("created_at",{ascending:false}),
  sb.from("menus").select("*").order("created_at",{ascending:false}),
  sb.from("meal_plans").select("*").order("meal_date",{ascending:true}),
  sb.from("shopping_items").select("*").order("done").order("created_at",{ascending:false})
 ]);
 setLoading(false);
 for(const r of [a,b,c,d]) if(r.error)return fail(r.error);
 state.ingredients=a.data||[];state.menus=b.data||[];state.plans=c.data||[];state.shopping=d.data||[];
 render();
}
function subscribeRealtime(){
 if(realtimeChannel) sb.removeChannel(realtimeChannel);
 realtimeChannel=sb.channel("babymeal-"+user.id)
 .on("postgres_changes",{event:"*",schema:"public",table:"ingredients",filter:`user_id=eq.${user.id}`},loadAll)
 .on("postgres_changes",{event:"*",schema:"public",table:"menus",filter:`user_id=eq.${user.id}`},loadAll)
 .on("postgres_changes",{event:"*",schema:"public",table:"meal_plans",filter:`user_id=eq.${user.id}`},loadAll)
 .on("postgres_changes",{event:"*",schema:"public",table:"shopping_items",filter:`user_id=eq.${user.id}`},loadAll)
 .subscribe();
}
document.addEventListener("visibilitychange",()=>{if(!document.hidden&&user)loadAll()});

async function addIngredient(){
 const name=$("ingName").value.trim(); if(!name)return alert("식재료명을 입력해줘.");
 const quantity=Number($("ingQty").value);
 if(!Number.isFinite(quantity)||quantity<0)return alert("수량은 0 이상이어야 해.");
 const {error}=await sb.from("ingredients").insert({
  user_id:user.id,name,category:$("ingCategory").value,storage_place:$("ingPlace").value,
  quantity,unit:$("ingUnit").value,expiry_date:$("ingExpiry").value||null
 });
 if(error)return fail(error);
 $("ingName").value="";$("ingQty").value="1";$("ingExpiry").value="";
 await loadAll();
}
async function changeQty(id,delta){
 const x=state.ingredients.find(v=>v.id===id); if(!x)return;
 const quantity=Math.max(0,Number((Number(x.quantity)+delta).toFixed(2)));
 const {error}=await sb.from("ingredients").update({quantity,depleted:quantity===0?true:x.depleted}).eq("id",id);
 if(error)return fail(error); await loadAll();
}
async function toggleDepleted(id){
 const x=state.ingredients.find(v=>v.id===id); if(!x)return;
 const {error}=await sb.from("ingredients").update({depleted:!x.depleted}).eq("id",id);
 if(error)return fail(error); await loadAll();
}
async function addMenu(){
 const name=$("menuName").value.trim(); if(!name)return alert("메뉴명을 입력해줘.");
 const {error}=await sb.from("menus").insert({user_id:user.id,name,ingredients_text:$("menuIngredients").value.trim(),reaction:$("menuReaction").value,memo:$("menuMemo").value.trim()});
 if(error)return fail(error);
 $("menuName").value="";$("menuIngredients").value="";$("menuMemo").value="";$("menuReaction").value="반응 미기록";await loadAll();
}
async function addPlan(){
 const meal_date=$("planDate").value, menu_name=$("planCustom").value.trim()||$("planMenu").value;
 if(!meal_date)return alert("날짜를 선택해줘."); if(!menu_name)return alert("메뉴를 입력해줘.");
 const {error}=await sb.from("meal_plans").insert({user_id:user.id,meal_date,meal_slot:$("planSlot").value,menu_name});
 if(error)return fail(error);$("planCustom").value="";await loadAll();
}
async function addShopping(){
 const name=$("shopName").value.trim();if(!name)return;
 const {error}=await sb.from("shopping_items").insert({user_id:user.id,name});
 if(error)return fail(error);$("shopName").value="";await loadAll();
}
async function toggleShopping(id){
 const x=state.shopping.find(v=>v.id===id);if(!x)return;
 const {error}=await sb.from("shopping_items").update({done:!x.done}).eq("id",id);
 if(error)return fail(error);await loadAll();
}
async function removeRow(table,id){
 if(!confirm("삭제할까?"))return;
 const {error}=await sb.from(table).delete().eq("id",id);if(error)return fail(error);await loadAll();
}
function setFilter(v){ingredientFilter=v;renderIngredients()}

function renderIngredients(){
 let list=state.ingredients;
 if(ingredientFilter==="소진")list=list.filter(x=>x.depleted);
 else if(ingredientFilter!=="전체")list=list.filter(x=>x.storage_place===ingredientFilter&&!x.depleted);
 $("ingredientList").innerHTML=list.length?list.map(x=>{
 const cls=x.storage_place==="상온"?"tag-room":x.storage_place==="냉장"?"tag-cold":"tag-freeze";
 return `<div class="card item">
 <div class="${x.depleted?"depleted":""}">
  <div class="item-title">${esc(x.name)}</div>
  <div class="meta"><span class="tag tag-cat">${esc(x.category)}</span><span class="tag ${cls}">${esc(x.storage_place)}</span>${Number(x.quantity)}${esc(x.unit)}${x.expiry_date?esc(dLabel(x.expiry_date)):""}</div>
 </div>
 <div class="toolbar">
  <button class="btn ghost" onclick="changeQty('${x.id}',-1)" ${Number(x.quantity)<=0?"disabled":""}>−</button>
  <button class="btn ghost" onclick="changeQty('${x.id}',1)">＋</button>
  <button class="btn soft" onclick="toggleDepleted('${x.id}')">${x.depleted?"복구":"소진"}</button>
  <button class="btn danger" onclick="removeRow('ingredients','${x.id}')">삭제</button>
 </div></div>`;
 }).join(""):`<div class="empty">해당 재고가 없어.</div>`;
}
function renderMenus(){
 $("menuList").innerHTML=state.menus.length?state.menus.map(x=>`<div class="card item"><div><div class="item-title">${esc(x.name)}</div><div class="meta">${esc(x.ingredients_text||"재료 미입력")} · ${esc(x.reaction)}</div>${x.memo?`<div class="meta">${esc(x.memo)}</div>`:""}</div><button class="btn danger" onclick="removeRow('menus','${x.id}')">삭제</button></div>`).join(""):`<div class="empty">저장 메뉴가 없어.</div>`;
 $("planMenu").innerHTML=`<option value="">저장 메뉴 선택</option>`+state.menus.map(x=>`<option value="${esc(x.name)}">${esc(x.name)}</option>`).join("");
}
function renderPlans(){
 const grouped={};state.plans.forEach(x=>(grouped[x.meal_date]??=[]).push(x));
 $("planList").innerHTML=Object.keys(grouped).length?Object.entries(grouped).sort().map(([date,items])=>`<div class="day"><h4>${esc(date)}</h4>${items.sort((a,b)=>["아침","점심","간식","저녁"].indexOf(a.meal_slot)-["아침","점심","간식","저녁"].indexOf(b.meal_slot)).map(x=>`<div class="meal"><div class="slot">${esc(x.meal_slot)}</div><div>${esc(x.menu_name)}</div><button class="btn danger" onclick="removeRow('meal_plans','${x.id}')">삭제</button></div>`).join("")}</div>`).join(""):`<div class="empty">식단이 없어.</div>`;
}
function renderShopping(){
 $("shoppingList").innerHTML=state.shopping.length?state.shopping.map(x=>`<div class="card item"><div class="${x.done?"depleted":""}" onclick="toggleShopping('${x.id}')" style="flex:1"><div class="item-title">${esc(x.name)}</div><div class="meta">눌러서 완료 표시</div></div><button class="btn danger" onclick="removeRow('shopping_items','${x.id}')">삭제</button></div>`).join(""):`<div class="empty">장보기 항목이 없어.</div>`;
}
function renderHome(){
 const today=dateToday(),todays=state.plans.filter(x=>x.meal_date===today);
 $("mIngredients").textContent=state.ingredients.filter(x=>!x.depleted).length;
 $("mMenus").textContent=state.menus.length;$("mToday").textContent=todays.length;
 $("mShopping").textContent=state.shopping.filter(x=>!x.done).length;
 $("todayMeals").innerHTML=todays.length?todays.map(x=>`<div class="meal"><div class="slot">${esc(x.meal_slot)}</div><div>${esc(x.menu_name)}</div></div>`).join(""):`<div class="empty">오늘 식단이 아직 없어.</div>`;
}
function render(){renderHome();renderIngredients();renderMenus();renderPlans();renderShopping()}

async function migrateLegacy(){
 const raw=localStorage.getItem("babymeal-data-v1"); if(!raw)return alert("이 브라우저에서 이전 데이터를 찾지 못했어.");
 let old;try{old=JSON.parse(raw)}catch{return alert("이전 데이터를 읽지 못했어.")}
 if(!confirm("이전 로컬 데이터를 서버에 복사할까? 중복 실행하면 같은 항목이 중복될 수 있어."))return;
 setLoading(true);
 const ops=[];
 if(old.ingredients?.length) ops.push(sb.from("ingredients").insert(old.ingredients.map(x=>({user_id:user.id,name:x.name,category:"기타",quantity:Number(x.qty||0),unit:x.unit||"개",storage_place:x.place||"냉장",expiry_date:x.expiry||null}))));
 if(old.menus?.length) ops.push(sb.from("menus").insert(old.menus.map(x=>({user_id:user.id,name:x.name,ingredients_text:x.ingredients||"",reaction:x.reaction||"반응 미기록",memo:x.memo||""}))));
 if(old.plans?.length) ops.push(sb.from("meal_plans").insert(old.plans.map(x=>({user_id:user.id,meal_date:x.date,meal_slot:x.slot,menu_name:x.name}))));
 if(old.shopping?.length) ops.push(sb.from("shopping_items").insert(old.shopping.map(x=>({user_id:user.id,name:x.name,done:!!x.done}))));
 const results=await Promise.all(ops);setLoading(false);
 const err=results.find(x=>x.error)?.error;if(err)return fail(err);
 alert("이전 데이터 복사 완료!");await loadAll();
}
$("planDate").value=dateToday();
</script>
