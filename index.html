<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f7d978">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="BabyMeal">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
  <title>BabyMeal</title>
</head>
<body>
  <div id="loading" class="loading hidden">서버와 동기화 중…</div>

  <div id="authView">
    <div class="auth-card">
      <div class="logo">🥣 BabyMeal</div>
      <div class="subtitle">도아의 유아식과 재고를 한곳에서 관리해요.</div>
      <label for="authEmail">이메일</label>
      <input id="authEmail" type="email" autocomplete="email" placeholder="example@email.com">
      <label for="authPassword">비밀번호</label>
      <input id="authPassword" type="password" autocomplete="current-password" minlength="6" placeholder="6자 이상">
      <button class="btn primary full" type="button" id="loginButton">로그인</button>
      <div id="authMsg" class="msg"></div>
    </div>
  </div>

  <div id="appView" class="hidden">
    <header class="app-header">
      <div>
        <div class="brand">🥣 BabyMeal</div>
        <div class="meta"><span class="status-dot"></span>Supabase 동기화</div>
      </div>
      <div class="account-box">
        <div id="accountEmail" class="account"></div>
        <button class="btn ghost compact" type="button" id="logoutButton">로그아웃</button>
      </div>
    </header>

    <main>
      <section id="home" class="active">
        <div class="hero-card">
          <div class="eyebrow">오늘의 이유식</div>
          <div id="homeDate" class="hero-date"></div>
          <div id="todayMeals" class="today-meals"></div>
        </div>

        <div class="dashboard-grid">
          <button class="dashboard-card" type="button" data-jump="ingredients">
            <span class="dashboard-icon">⏳</span>
            <span class="dashboard-label">유통기한 임박</span>
            <strong id="mExpirySoon">0</strong>
          </button>
          <button class="dashboard-card" type="button" data-jump="ingredients" data-filter-jump="조리 필요">
            <span class="dashboard-icon">🍳</span>
            <span class="dashboard-label">조리 필요</span>
            <strong id="mNeedCooking">0</strong>
          </button>
          <button class="dashboard-card" type="button" data-jump="shopping">
            <span class="dashboard-icon">🛒</span>
            <span class="dashboard-label">장보기</span>
            <strong id="mShopping">0</strong>
          </button>
          <button class="dashboard-card" type="button" data-jump="plan">
            <span class="dashboard-icon">📅</span>
            <span class="dashboard-label">오늘 식단</span>
            <strong id="mToday">0</strong>
          </button>
        </div>

        <div class="card">
          <div class="section-title-row">
            <h3>유통기한이 가까워요</h3>
            <button class="text-button" type="button" data-jump="ingredients">재고 보기</button>
          </div>
          <div id="expirySoonList"></div>
        </div>

        <div class="card">
          <div class="section-title-row">
            <h3>조리해야 해요</h3>
            <button class="text-button" type="button" data-jump="ingredients" data-filter-jump="조리 필요">모두 보기</button>
          </div>
          <div id="needCookingList"></div>
        </div>
      </section>

      <section id="plan">
        <div class="card">
          <h3>식단 추가</h3>
          <div class="row3">
            <input id="planDate" type="date">
            <select id="planSlot"><option>아침</option><option>점심</option><option>간식</option><option>저녁</option></select>
            <input id="planCustom" placeholder="메뉴 또는 음식 입력">
          </div>
          <button class="btn primary full" type="button" id="planAddButton">식단에 추가</button>
        </div>
        <div class="weekly-wrap card">
          <div class="weekly-head">
            <button class="btn ghost" type="button" id="prevWeekButton">← 이전 주</button>
            <h3 id="weekTitle">주간 식단</h3>
            <button class="btn ghost" type="button" id="nextWeekButton">다음 주 →</button>
          </div>
          <div class="weekly-scroll"><div id="weeklyTable"></div></div>
        </div>
      </section>

      <section id="ingredients">
        <div class="card">
          <h3 id="ingredientFormTitle">재고 추가</h3>
          <input id="ingredientEditId" type="hidden">
          <label for="ingName">품목명</label>
          <input id="ingName" placeholder="예: 닭안심, 바나나, 닭고기볶음밥">

          <label for="ingCategory">분류</label>
          <select id="ingCategory">
            <option>육류</option><option>가금류</option><option>채소</option><option>과일</option>
            <option>해산물</option><option>실온 간식</option><option>냉동 간식</option><option>완제품</option><option>기타</option>
          </select>

          <fieldset class="status-fieldset">
            <legend>상태</legend>
            <div class="status-control" id="statusControl">
              <button class="status-option selected" type="button" data-status="구매" aria-pressed="true"><span>🛒</span>구매</button>
              <button class="status-option" type="button" data-status="소분" aria-pressed="false"><span>🔪</span>소분</button>
              <button class="status-option" type="button" data-status="조리 필요" aria-pressed="false"><span>🍳</span>조리 필요</button>
            </div>
          </fieldset>
          <input id="ingStatus" type="hidden" value="구매">

          <label for="ingExpiry">유통기한</label>
          <input id="ingExpiry" type="date" aria-label="유통기한">

          <div class="subsection-title">소분 정보 <span class="meta">(선택)</span></div>
          <div class="row3">
            <input id="ingPortionAmount" type="number" min="0" step="0.1" placeholder="1개당 용량 예: 50">
            <select id="ingPortionUnit"><option>g</option><option>ml</option><option>개</option><option>팩</option><option>봉</option></select>
            <input id="ingPortionCount" type="number" min="0" step="1" placeholder="소분 개수 예: 3">
          </div>

          <div class="toolbar">
            <button class="btn primary" type="button" id="ingredientSaveButton">추가</button>
            <button class="btn ghost hidden" type="button" id="ingredientCancelButton">수정 취소</button>
          </div>
        </div>

        <div class="filter-scroll" id="ingredientFilters">
          <button class="filter-chip active" data-filter="전체" type="button">전체</button>
          <button class="filter-chip" data-filter="구매" type="button">구매</button>
          <button class="filter-chip" data-filter="소분" type="button">소분</button>
          <button class="filter-chip" data-filter="조리 필요" type="button">조리 필요</button>
          <button class="filter-chip" data-filter="완제품" type="button">완제품</button>
          <button class="filter-chip" data-filter="소진" type="button">소진</button>
        </div>
        <div id="ingredientList"></div>
      </section>

      <section id="shopping">
        <div class="card">
          <h3>장보기 추가</h3>
          <div class="row"><input id="shopName" placeholder="구매할 품목"><button class="btn primary" type="button" id="shoppingAddButton">추가</button></div>
        </div>
        <div class="card"><h3>구매 전</h3><div id="shoppingPendingList"></div></div>
        <div class="card completed-card"><h3>구매 완료</h3><div id="shoppingCompletedList"></div></div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="주요 메뉴">
      <button class="bottom-tab active" data-tab="home" type="button"><span class="tab-icon">⌂</span><span>홈</span></button>
      <button class="bottom-tab" data-tab="plan" type="button"><span class="tab-icon">▦</span><span>주간 식단</span></button>
      <button class="bottom-tab" data-tab="ingredients" type="button"><span class="tab-icon inventory-icon">🥩</span><span>재고</span></button>
      <button class="bottom-tab" data-tab="shopping" type="button"><span class="tab-icon">🛒</span><span>장보기</span></button>
    </nav>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
